<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashDB - MongoDB Compass Style UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="min-h-screen bg-[#1a1a2e] text-[#e0e0e0] font-['Inter',-apple-system,BlinkMacSystemFont,sans-serif]">
    <header class="bg-[#0d1117] p-3 px-6 flex items-center border-b border-[#30363d]">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[#4db33d] rounded flex items-center justify-center">
                <i class="material-icons" style="color: #fff; font-size: 20px;">storage</i>
            </div>
            <h1 class="text-lg font-semibold text-white">FlashDB Compass</h1>
        </div>
        <div class="ml-auto text-sm text-[#888]">localhost:8080</div>
    </header>
    
    <div class="flex h-[calc(100vh-57px)]">
        <div class="w-64 bg-[#0d1117] border-r border-[#30363d] overflow-y-auto">
            <div class="p-4 text-xs uppercase tracking-wider text-[#888] border-b border-[#30363d]">Collections (Tables)</div>
            <div class="py-2" id="tables">
                <div class="p-10 text-center text-[#666] text-sm">Loading...</div>
            </div>
        </div>
        
        <div class="flex-1 flex flex-col">
            <div class="p-3 px-6 bg-[#0d1117] border-b border-[#30363d] flex items-center gap-3">
                <button class="bg-[#238636] text-white border border-[#238636] px-3 py-1 rounded text-sm flex items-center gap-1 hover:bg-[#2ea043]" onclick="executeQuery()">
                    <i class="material-icons" style="font-size: 16px;">play_arrow</i>
                    Find
                </button>
                <button class="bg-[#21262d] text-white border border-[#30363d] px-3 py-1 rounded text-sm flex items-center gap-1 hover:bg-[#30363d]" onclick="clearQuery()">
                    <i class="material-icons" style="font-size: 16px;">clear</i>
                    Clear
                </button>
                <button class="bg-[#21262d] text-white border border-[#30363d] px-3 py-1 rounded text-sm flex items-center gap-1 hover:bg-[#30363d]" onclick="setQuery('SELECT * FROM products LIMIT 10')">
                    <i class="material-icons" style="font-size: 16px;">table_chart</i>
                    Products
                </button>
                <button class="bg-[#21262d] text-white border border-[#30363d] px-3 py-1 rounded text-sm flex items-center gap-1 hover:bg-[#30363d]" onclick="setQuery('SELECT * FROM address LIMIT 10')">
                    <i class="material-icons" style="font-size: 16px;">table_chart</i>
                    Address
                </button>
            </div>
            
            <div class="flex-1 p-6 flex flex-col">
                <textarea 
                    id="sql"
                    class="flex-1 bg-[#0d1117] border border-[#30363d] rounded p-4 font-mono text-sm text-[#c9d1d9] resize-none focus:outline-none focus:border-[#238636]"
                    placeholder="SELECT * FROM products"
                >SELECT * FROM products</textarea>
                <div id="result" class="mt-4 bg-[#0d1117] rounded border border-[#30363d] max-h-72 overflow-y-auto" style="display: none;">
                    <div class="p-2 px-4 bg-[#161b22] border-b border-[#30363d] text-xs text-[#888]">Documents</div>
                    <div id="result-content" class="p-4"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/main.js"></script>
</body>
</html>
